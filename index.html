<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Portal - Receipt / Admission</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        /* Full-page background slideshow */
        .bg-slideshow {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        .bg-slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
        }
        .bg-slide.active {
            opacity: 1;
            z-index: 1;
        }
        /* Dark overlay so content stays readable */
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgba(26, 71, 42, 0.75) 0%, rgba(44, 94, 64, 0.7) 50%, rgba(0, 0, 0, 0.6) 100%);
            z-index: 1;
            pointer-events: none;
        }
        /* Content on top */
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 480px;
        }
        h1 {
            color: #fff;
            margin: 0 0 0.5rem 0;
            font-size: 1.75rem;
            font-weight: 700;
            text-shadow: 0 2px 12px rgba(0,0,0,0.4);
            letter-spacing: 0.02em;
        }
        .content > p {
            color: rgba(255, 255, 255, 0.92);
            margin-bottom: 2rem;
            font-size: 1rem;
            text-shadow: 0 1px 6px rgba(0,0,0,0.3);
            line-height: 1.5;
        }
        .portal-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .portal-card {
            display: block;
            width: 220px;
            padding: 1.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: #1a472a;
            font-weight: bold;
            font-size: 1.05rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.2s;
            backdrop-filter: blur(8px);
        }
        .portal-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.35);
            background: #fff;
        }
        .portal-card.takshashila { border-top: 4px solid #1a472a; }
        .portal-card.lakshya { border-top: 4px solid #2c5e40; }
    </style>
</head>
<body>
    <div class="bg-slideshow" id="bgSlideshow" aria-hidden="true"></div>
    <div class="bg-overlay"></div>
    <div class="content">
        <h1>Choose Portal</h1>
        <div class="portal-grid">
            <a href="takshashila.html" class="portal-card takshashila">Takshashila portal</a>
            <a href="lakshya.html" class="portal-card lakshya">Lakshya portal</a>
        </div>
    </div>
    <script>
        (function () {
            var folder = 'assets/landing/';
            var maxSlides = 25;
            var extensions = ['jpg', 'jpeg', 'png', 'webp'];
            var slides = [];
            var container = document.getElementById('bgSlideshow');
            var currentIndex = 0;
            var intervalMs = 5000;

            function tryLoadSlides() {
                var index = 1;
                function tryNext() {
                    if (index > maxSlides) {
                        startSlideshow();
                        return;
                    }
                    var extIndex = 0;
                    function tryExt() {
                        if (extIndex >= extensions.length) {
                            index++;
                            tryNext();
                            return;
                        }
                        var ext = extensions[extIndex];
                        var url = folder + index + (ext === 'jpeg' ? '.jpeg' : '.' + ext);
                        var img = new Image();
                        img.onload = function () {
                            slides.push(url);
                            index++;
                            tryNext();
                        };
                        img.onerror = function () {
                            extIndex++;
                            tryExt();
                        };
                        img.src = url;
                    }
                    tryExt();
                }
                tryNext();
            }

            var fallbackImages = [
                'https://images.unsplash.com/photo-1523240795612-9a054b0db644?w=1920&q=80',
                'https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=1920&q=80',
                'https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=1920&q=80',
                'https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=1920&q=80',
                'https://images.unsplash.com/photo-1523050872442-44cbdd921946?w=1920&q=80'
            ];

            function startSlideshow() {
                if (slides.length === 0) {
                    slides = fallbackImages.slice();
                }
                slides.forEach(function (url, i) {
                    var div = document.createElement('div');
                    div.className = 'bg-slide' + (i === 0 ? ' active' : '');
                    div.style.backgroundImage = 'url(' + url + ')';
                    container.appendChild(div);
                });
                setInterval(function () {
                    var els = container.querySelectorAll('.bg-slide');
                    if (els.length === 0) return;
                    els[currentIndex].classList.remove('active');
                    currentIndex = (currentIndex + 1) % els.length;
                    els[currentIndex].classList.add('active');
                }, intervalMs);
            }

            tryLoadSlides();
        })();
    </script>
</body>
</html>
