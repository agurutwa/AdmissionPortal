<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Portal - Receipt / Admission</title>
    <link rel="preload" href="assets/landing/1.webp" as="image">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        /* Full-page static background */
        .bg-static {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #2c4a36 url('assets/landing/1.webp') center / cover no-repeat;
        }
        /* Dark overlay so content stays readable */
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgba(26, 71, 42, 0.75) 0%, rgba(44, 94, 64, 0.7) 50%, rgba(0, 0, 0, 0.6) 100%);
            z-index: 1;
            pointer-events: none;
        }
        /* Content on top */
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 480px;
        }
        h1 {
            color: #fff;
            margin: 0 0 0.5rem 0;
            font-size: 1.75rem;
            font-weight: 700;
            text-shadow: 0 2px 12px rgba(0,0,0,0.4);
            letter-spacing: 0.02em;
        }
        .content > p {
            color: rgba(255, 255, 255, 0.92);
            margin-bottom: 2rem;
            font-size: 1rem;
            text-shadow: 0 1px 6px rgba(0,0,0,0.3);
            line-height: 1.5;
        }
        .portal-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .portal-card {
            display: block;
            width: 220px;
            padding: 1.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: #1a472a;
            font-weight: bold;
            font-size: 1.05rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.2s;
            backdrop-filter: blur(8px);
        }
        .portal-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.35);
            background: #fff;
        }
        .portal-card.takshashila { border-top: 4px solid #1a472a; }
        .portal-card.lakshya { border-top: 4px solid #2c5e40; }
    </style>
</head>
<body>
    <div class="bg-static" aria-hidden="true"></div>
    <div class="bg-overlay"></div>
    <div class="content">
        <h1>Choose Portal</h1>
        <div class="portal-grid">
            <a href="takshashila.html" class="portal-card takshashila">Takshashila portal</a>
            <a href="lakshya.html" class="portal-card lakshya">Lakshya portal</a>
        </div>
    </div>
</body>
</html>
